<div class="group relative aspect-square border transition-all duration-200 cursor-pointer select-none rounded-md flex flex-col items-center justify-center shadow-sm overflow-hidden"
  [class.bg-[var(--color-high-occupied)]]="room().status === 'occupied'"
  [class.border-green-600]]="room().status === 'occupied'"
  [class.bg-white]="room().status === 'vacant'"
  [class.border-[var(--color-high-border)]]="room().status === 'vacant'"
  (dblclick)="onDblClick()"
  [matTooltip]="getTooltipContent()">
  <span
    class="text-[14px] font-bold tracking-tight"
    [class.text-white]="room().status === 'occupied'"
    [class.text-slate-700]="room().status === 'vacant'">
    {{ room().roomNumber }}
  </span>
  <!-- Small Status Indicator -->
  @if (room().status === 'occupied') {
    <div class="absolute bottom-1 right-1">
      <mat-icon class="!text-[10px] !w-3 !h-3 text-white opacity-50">
        person
      </mat-icon>
    </div>
  }
  <!-- Hover Overlay -->
  <div
    class="absolute inset-0 bg-[var(--color-high-accent)] opacity-0 group-hover:opacity-10 transition-opacity"></div>
</div>
