<nav
    class="bg-[var(--color-high-primary)] text-white h-16 flex items-center px-5 gap-6 shadow-md border-b-4 border-[var(--color-high-accent)] sticky top-0 z-50">
    <div class="flex items-center gap-2">

        </div>
        <span class="text-base font-bold tracking-tight uppercase">

            <span class="text-[var(--color-high-accent)]">
                Pro
            </span>
        </span>
    </div>

            </mat-icon>
            <span class="text-[9px] uppercase font-bold tracking-wider opacity-60 group-hover:opacity-100">

            </span>
        </button>
        }

        <div class="text-right hidden sm:block">
            <p class="text-[9px] text-white/40 font-bold uppercase tracking-widest leading-none">
                Logged In
            </p>
            <p class="text-xs font-bold leading-tight">
                Reception Admin
            </p>
        </div>
        <button mat-icon-button class="!bg-white/5 hover:!bg-white/10 !w-10 !h-10">

                account_circle
            </mat-icon>
        </button>
